name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "api/**"
      - "pkg/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  INFRA_REPO: puchidemy/puchi-infra

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - core
          - content
          - grading
          - game
          - user
          - media
          - notification
          - auth
          - email
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: app/${{ matrix.service }}/go.sum
      - run: go vet ./...
        working-directory: app/${{ matrix.service }}

  build-and-push:
    if: github.ref == 'refs/heads/main'
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - core
          - content
          - grading
          - game
          - user
          - media
          - notification
          - auth
          - email
    steps:
      - uses: actions/checkout@v4

      - name: Docker login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/puchi-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=git-,format=short

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-infra:
    if: github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          path: puchi-infra

      - name: Update all backend deployment images
        run: |
          SHA_TAG="git-${GITHUB_SHA::7}"
          for service in core content grading game user media notification auth email; do
            DEPLOY="puchi-infra/infra/backend/$service/deployment.yaml"
            OLD_IMAGE="ghcr.io/puchidemy/puchi-$service:latest"
            NEW_IMAGE="ghcr.io/puchidemy/puchi-$service:$SHA_TAG"
            if grep -q "image:" "$DEPLOY"; then
              sed -i "s|image: ghcr.io/puchidemy/puchi-$service:.*|image: $NEW_IMAGE|" "$DEPLOY"
              echo "Updated $DEPLOY to $NEW_IMAGE"
            else
              echo "No image line found in $DEPLOY"
            fi
          done

      - name: Commit and push to infra repo
        run: |
          cd puchi-infra
          git config --global user.name "puchi-bot"
          git config --global user.email "bot@puchi.io.vn"
          git add infra/backend/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update backend image tags to ${{ github.sha }}

            Automated by CI/CD for commit ${{ github.sha }}"
            git pull --rebase
            git push
          fi
