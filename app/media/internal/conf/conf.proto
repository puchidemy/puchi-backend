syntax = "proto3";
package kratos.api;

option go_package = "tmp_media/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Media media = 3;
  Auth auth = 4;
}

message Auth {
  string auth_service_url = 1;
  repeated string public_paths = 2;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  Database database = 1;
  Redis redis = 2;
}

message Media {
  message Storage {
    string endpoint = 1;
    string access_key_id = 2;
    string secret_access_key = 3;
    string bucket = 4;
    bool use_ssl = 5;
    string region = 6;
    string cdn_base_url = 7;
  }
  message Upload {
    int64 max_size_bytes = 1;
    int64 presigned_url_ttl = 2;
  }
  Storage storage = 1;
  Upload upload = 2;
}
