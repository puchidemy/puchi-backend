server:
  http:
    addr: 0.0.0.0:8000
    timeout: 1s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 1s
data:
  database:
    driver: postgresql
    source: "postgresql://puchi:puchi-db-prod@192.168.100.201:30433/puchi?sslmode=disable"
  redis:
    addr: 127.0.0.1:6379
    read_timeout: 0.2s
    write_timeout: 0.2s
media:
  storage:
    endpoint: "https://<ACCOUNT_ID>.r2.cloudflarestorage.com"
    access_key_id: "" # set via R2_ACCESS_KEY_ID env
    secret_access_key: "" # set via R2_SECRET_ACCESS_KEY env
    bucket: "puchi-media"
    use_ssl: true
    region: "auto"
    cdn_base_url: "https://cdn.puchi.io.vn"
  upload:
    max_size_bytes: 10485760
    presigned_url_ttl: 900
auth:
  auth_service_url: "http://localhost:8080"
  public_paths:
    - /v1/health
    - /v1/healthz
