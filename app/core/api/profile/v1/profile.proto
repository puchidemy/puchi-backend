syntax = "proto3";

package puchi.core.profile.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/puchidemy/puchi-backend/app/core/api/profile/v1;v1";
option java_multiple_files = true;
option java_package = "io.grpc.examples.profile.v1";
option java_outer_classname = "ProfileProto";

service ProfileService {
  rpc GetProfile(google.protobuf.Empty) returns (User) {
    option (google.api.http) = {
      get: "/v1/profile"
    };
  }

  rpc UpdateProfile(UpdateProfileRequest) returns (User) {
    option (google.api.http) = {
      put: "/v1/profile"
      body: "*"
    };
  }

  rpc GetStats(google.protobuf.Empty) returns (Stats) {
    option (google.api.http) = {
      get: "/v1/profile/stats"
    };
  }

  rpc ListDailyActivity(ListDailyActivityRequest) returns (DailyActivityList) {
    option (google.api.http) = {
      get: "/v1/profile/stats/daily-activity"
    };
  }

  rpc ListWeeklyXP(ListWeeklyXPRequest) returns (WeeklyXPList) {
    option (google.api.http) = {
      get: "/v1/profile/stats/weekly-xp"
    };
  }

  rpc ListAchievements(google.protobuf.Empty) returns (AchievementList) {
    option (google.api.http) = {
      get: "/v1/profile/achievements"
    };
  }

  rpc GetProfileByUsername(GetProfileByUsernameRequest) returns (User) {
    option (google.api.http) = {
      get: "/v1/profile/{username}"
    };
  }

  rpc UpdateAvatar(UpdateAvatarRequest) returns (User) {
    option (google.api.http) = {
      put: "/v1/profile/avatar"
      body: "*"
    };
  }

  rpc CompleteOnboarding(CompleteOnboardingRequest) returns (User) {
    option (google.api.http) = {
      post: "/v1/onboarding/complete"
      body: "*"
    };
  }

  rpc GetLinkedAccounts(google.protobuf.Empty) returns (LinkedAccountsResponse) {
    option (google.api.http) = {
      get: "/v1/profile/linked-accounts"
    };
  }

  rpc GetSettings(google.protobuf.Empty) returns (UserSettings) {
    option (google.api.http) = {
      get: "/v1/profile/settings"
    };
  }

  rpc UpdateSettings(UpdateSettingsRequest) returns (UserSettings) {
    option (google.api.http) = {
      patch: "/v1/profile/settings"
      body: "*"
    };
  }

  rpc MergeSettings(MergeSettingsRequest) returns (MergeSettingsResponse) {
    option (google.api.http) = {
      post: "/v1/profile/settings/merge"
      body: "*"
    };
  }
}

message Achievement {
  string id = 1;
  string title = 2;
  string description = 3;
  string icon = 4;
  string color = 5;
  int32 progress = 6;
  string progress_label = 7;
  bool unlocked = 8;
  google.protobuf.Timestamp unlocked_at = 9;
}

message AchievementList { repeated Achievement items = 1; }

message Stats {
  int32 total_lessons = 1;
  int32 completed_lessons = 2;
  int32 total_minutes = 3;
  float accuracy = 4;
  int32 words_learned = 5;
  int32 current_xp = 6;
  int32 total_xp = 7;
  int32 level = 8;
  int32 xp_to_next_level = 9;
  int32 streak = 10;
  int32 longest_streak = 11;
  int32 streak_freezes = 12;
  int32 crowns = 13;
  int32 gems = 14;
}

message User {
  string id = 1;
  string username = 2;
  string first_name = 3;
  string last_name = 4;
  string email = 5;
  string avatar_url = 6;
  string bio = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  bool onboarding_completed = 10;
  string age_range = 11;
}

message UpdateProfileRequest {
  string first_name = 1;
  string last_name = 2;
  string username = 3;
  string bio = 4;
  string age_range = 5;
}

message UpdateAvatarRequest {
  string avatar_key = 1;
}

message GetProfileByUsernameRequest {
  string username = 1;
}

message ListDailyActivityRequest {
  // YYYY-MM-DD; defaults to 90 days ago when empty.
  string from = 1;
  // YYYY-MM-DD; defaults to today (UTC) when empty.
  string to = 2;
}

message DailyActivityItem {
  string date = 1;
  int32 lessons_completed = 2;
  int32 xp_earned = 3;
  int32 minutes_spent = 4;
}

message DailyActivityList {
  repeated DailyActivityItem items = 1;
}

message ListWeeklyXPRequest {
  // Number of weeks to return; defaults to 12.
  int32 weeks = 1;
}

message WeeklyXPItem {
  string week_label = 1;
  int32 xp = 2;
}

message WeeklyXPList {
  repeated WeeklyXPItem items = 1;
}

message CompleteOnboardingRequest {
  string first_name = 1;
  string last_name = 2;
  string age_range = 3;
  string how_heard = 4;
  string why_learn = 5;
  string level = 6;
  string username = 7; // optional; FE may send editable prefilled username
}

message LinkedAccount {
  string provider = 1;
  string email = 2;
  string linked_at = 3;
}

message LinkedAccountsResponse {
  repeated LinkedAccount accounts = 1;
}

message UserSettings {
  bool sound_effects = 1;
  bool animations = 2;
  bool motivational_messages = 3;
  bool listening_exercises = 4;
  string theme = 5;
  string locale = 6;
  string privacy_json = 7; // JSON string
}

message UpdateSettingsRequest {
  optional bool sound_effects = 1;
  optional bool animations = 2;
  optional bool motivational_messages = 3;
  optional bool listening_exercises = 4;
  optional string theme = 5;
  optional string locale = 6;
  optional string privacy_json = 7;
}

// Clients must send a full guest settings snapshot. Unset bool fields default to false
// and are meaningful for merge (e.g. sound_effects=false is an intentional guest choice).
message MergeSettingsRequest { UserSettings guest = 1; }
message MergeSettingsResponse {
  UserSettings settings = 1;
  repeated string fields_merged = 2;
}
