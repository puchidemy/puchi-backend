syntax = "proto3";

package puchi.core.profile.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/puchidemy/puchi-backend/app/core/api/profile/v1;v1";
option java_multiple_files = true;
option java_package = "io.grpc.examples.profile.v1";
option java_outer_classname = "ProfileProto";

service ProfileService {
  rpc GetProfile(google.protobuf.Empty) returns (User) {
    option (google.api.http) = {
      get: "/v1/profile"
    };
  }

  rpc UpdateProfile(UpdateProfileRequest) returns (User) {
    option (google.api.http) = {
      put: "/v1/profile"
      body: "*"
    };
  }
}

message User {
  string id = 1;
  string username = 2;
  string first_name = 3;
  string last_name = 4;
  string email = 5;
  string avatar_url = 6;
  string bio = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message UpdateProfileRequest {
  string first_name = 1;
  string last_name = 2;
  string username = 3;
  string bio = 4;
}
