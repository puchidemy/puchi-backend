server:
  http:
    addr: 0.0.0.0:8000
    timeout: 1s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 1s
data:
  database:
    source: "postgresql://puchi:puchi-db-prod@192.168.100.201:30433/puchi?sslmode=disable"
  redis:
    addr: 127.0.0.1:6379
    read_timeout: 0.2s
    write_timeout: 0.2s
auth:
  supertokens:
    connection_uri: "http://localhost:30567"
    api_key: "change-in-production-please"
    cookie_domain: "localhost"
    cookie_secure: false
    # api_domain: "http://localhost:8000"  # default nếu SUPERTOKENS_API_DOMAIN env không set
  public_paths:
    - /v1/health
    - /v1/healthz
