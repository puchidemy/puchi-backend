syntax = "proto3";
package kratos.api;

option go_package = "tmp_core/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Auth auth = 3;
  // CDN base URL for resolving avatar_key → avatar_url (e.g. https://cdn.puchi.io.vn).
  string cdn_base_url = 4;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string source = 1;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  message NATS {
    string url = 1;
  }
  Database database = 1;
  Redis redis = 2;
  NATS nats = 3;
}

message Auth {
  string auth_service_url = 1;
  repeated string public_paths = 2;
}
