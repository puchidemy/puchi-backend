syntax = "proto3";

package auth.v1;

import "google/api/annotations.proto";

option go_package = "github.com/puchidemy/puchi-backend/app/auth/api/auth/v1;authv1";

// AuthService handles authentication operations: register, login.
service AuthService {
  // Register creates a new user account.
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/auth/register"
      body: "*"
    };
  }

  // Login authenticates a user and returns tokens.
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/auth/login"
      body: "*"
    };
  }
}

// RegisterRequest contains the data needed to create a new account.
message RegisterRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
}

// RegisterResponse is returned after successful registration.
message RegisterResponse {
  string user_id = 1;
  string email = 2;
  string message = 3;
}

// LoginRequest contains the credentials for authentication.
message LoginRequest {
  string email = 1;
  string password = 2;
}

// LoginResponse contains the access token and user info.
message LoginResponse {
  string access_token = 1;
  int64 expires_in = 2;
  UserInfo user = 3;
}

// UserInfo represents basic user information.
message UserInfo {
  string id = 1;
  string email = 2;
  string display_name = 3;
  bool email_verified = 4;
}
