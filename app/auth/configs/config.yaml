server:
  http:
    addr: "0.0.0.0:8080"

limen:
  base_url: "http://localhost:8080"
  # 32-byte secret; override via LIMEN_SECRET in production
  secret: "dev-limen-secret-key-32bytes!!!!"
  trusted_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "https://puchi.io.vn"
  cookie_domain: "" # e.g. puchi.io.vn for cross-subdomain in prod
  frontend_url: "http://localhost:3000"

data:
  database:
    source: "postgres://puchi:puchi-db-prod@192.168.100.201:30433/puchi?sslmode=disable&search_path=auth"
  nats:
    url: ""
