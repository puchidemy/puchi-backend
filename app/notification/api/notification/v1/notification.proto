syntax = "proto3";

package puchi.notification.v1;

import "google/api/annotations.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/puchidemy/puchi-backend/app/notification/api/notification/v1;v1";

service NotificationService {
  rpc GetPreferences(GetPreferencesRequest) returns (Preferences) {
    option (google.api.http) = { get: "/v1/notifications/preferences" };
  }
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (Preferences) {
    option (google.api.http) = { put: "/v1/notifications/preferences"; body: "*" };
  }
  rpc Send(SendNotificationRequest) returns (SendNotificationResponse);
}

message Preferences {
  string user_id = 1;
  bool push_enabled = 2;
  bool email_enabled = 3;
  bool streak_reminder = 4;
  bool friend_activity = 5;
  bool promotions = 6;
  google.protobuf.StringValue quiet_hours_start = 7;
  google.protobuf.StringValue quiet_hours_end = 8;
}

message GetPreferencesRequest { string user_id = 1; }

message UpdatePreferencesRequest {
  string user_id = 1;
  google.protobuf.BoolValue push_enabled = 2;
  google.protobuf.BoolValue streak_reminder = 4;
  google.protobuf.BoolValue friend_activity = 5;
}

message SendNotificationRequest {
  string user_id = 1;
  string category = 2;     // "streak_reminder", "friend_activity", "achievement"
  string template_id = 3;
  map<string, string> params = 4;
}

message SendNotificationResponse { bool sent = 1; }
